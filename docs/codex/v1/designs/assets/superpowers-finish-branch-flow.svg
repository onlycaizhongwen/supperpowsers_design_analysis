<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">评审收尾分支流程图</title>
  <desc id="desc">展示代码评审、完成前验证和 finishing-a-development-branch 的收尾流程。</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker><style>.bg{fill:#fff;stroke:#cbd5e1;stroke-width:1.2;rx:12}.r{fill:#fdf2f8;stroke:#db2777;stroke-width:1.4;rx:10}.v{fill:#ecfdf5;stroke:#059669;stroke-width:1.4;rx:10}.o{fill:#eff6ff;stroke:#2563eb;stroke-width:1.4;rx:10}.w{fill:#fff7ed;stroke:#ea580c;stroke-width:1.4;rx:10}.line{stroke:#334155;stroke-width:1.4;fill:none;marker-end:url(#arrow)}.thin{stroke:#94a3b8;stroke-width:1.2;fill:none;marker-end:url(#arrow)}text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#0f172a}.title{font-size:24px;font-weight:700}.h{font-size:16px;font-weight:700}.s{font-size:13px;font-weight:500;fill:#475569}</style></defs>
  <rect x="20" y="20" width="1080" height="720" class="bg"/>
  <text x="560" y="58" text-anchor="middle" class="title">评审与收尾分支</text>
  <rect x="430" y="90" width="260" height="58" class="r"/><text x="560" y="124" text-anchor="middle" class="h">任务实现完成</text>
  <rect x="120" y="220" width="230" height="70" class="r"/><text x="235" y="248" text-anchor="middle" class="h">requesting-code-review</text><text x="235" y="270" text-anchor="middle" class="s">获取 SHAs，派发评审</text>
  <rect x="445" y="220" width="230" height="70" class="w"/><text x="560" y="248" text-anchor="middle" class="h">receiving-code-review</text><text x="560" y="270" text-anchor="middle" class="s">验证反馈，逐项处理</text>
  <rect x="770" y="220" width="230" height="70" class="v"/><text x="885" y="248" text-anchor="middle" class="h">verification</text><text x="885" y="270" text-anchor="middle" class="s">证据先于完成声明</text>
  <rect x="430" y="390" width="260" height="70" class="v"/><text x="560" y="418" text-anchor="middle" class="h">finishing-a-development-branch</text><text x="560" y="440" text-anchor="middle" class="s">测试通过后展示收尾选项</text>
  <rect x="80" y="570" width="210" height="62" class="o"/><text x="185" y="596" text-anchor="middle" class="h">1. 本地合并</text><text x="185" y="617" text-anchor="middle" class="s">merge 到 base branch</text>
  <rect x="330" y="570" width="210" height="62" class="o"/><text x="435" y="596" text-anchor="middle" class="h">2. 推送 PR</text><text x="435" y="617" text-anchor="middle" class="s">push 并创建 PR</text>
  <rect x="580" y="570" width="210" height="62" class="o"/><text x="685" y="596" text-anchor="middle" class="h">3. 保留分支</text><text x="685" y="617" text-anchor="middle" class="s">用户稍后处理</text>
  <rect x="830" y="570" width="210" height="62" class="w"/><text x="935" y="596" text-anchor="middle" class="h">4. 丢弃工作</text><text x="935" y="617" text-anchor="middle" class="s">必须先确认</text>
  <path d="M560 148 C560 190 235 180 235 220" class="thin"/><path d="M350 255 L445 255" class="line"/><path d="M675 255 L770 255" class="line"/>
  <path d="M885 290 C885 350 560 340 560 390" class="line"/>
  <path d="M560 460 C560 520 185 510 185 570" class="thin"/><path d="M560 460 C560 520 435 510 435 570" class="thin"/><path d="M560 460 C560 520 685 510 685 570" class="thin"/><path d="M560 460 C560 520 935 510 935 570" class="thin"/>
  <text x="560" y="690" text-anchor="middle" class="s">选项 1 / 2 / 4 之后清理 worktree；选项 3 保留工作区</text>
</svg>
