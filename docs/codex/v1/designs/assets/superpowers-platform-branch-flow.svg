<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">平台接入分支流程图</title>
  <desc id="desc">展示 Claude、Cursor、Codex、OpenCode、Gemini 等平台如何接入 superpowers 技能。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker>
    <style>
      .bg{fill:#fff;stroke:#cbd5e1;stroke-width:1.2;rx:12}.start{fill:#fef3c7;stroke:#d97706;stroke-width:1.5;rx:10}.box{fill:#f8fafc;stroke:#334155;stroke-width:1.3;rx:10}.p{fill:#eff6ff;stroke:#2563eb;stroke-width:1.3;rx:10}.core{fill:#ecfdf5;stroke:#059669;stroke-width:1.5;rx:10}.line{stroke:#334155;stroke-width:1.4;fill:none;marker-end:url(#arrow)}.thin{stroke:#94a3b8;stroke-width:1.2;fill:none;marker-end:url(#arrow)}text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#0f172a}.t{font-size:24px;font-weight:700}.h{font-size:16px;font-weight:700}.s{font-size:13px;font-weight:500;fill:#475569}
    </style>
  </defs>
  <rect x="20" y="20" width="1080" height="580" class="bg"/>
  <text x="560" y="58" text-anchor="middle" class="t">平台接入分支</text>
  <rect x="440" y="90" width="240" height="54" class="start"/>
  <text x="560" y="123" text-anchor="middle" class="h">安装或启用 Superpowers</text>
  <rect x="80" y="210" width="180" height="76" class="p"/>
  <text x="170" y="238" text-anchor="middle" class="h">Claude / Cursor</text>
  <text x="170" y="260" text-anchor="middle" class="s">manifest + hook</text>
  <rect x="300" y="210" width="180" height="76" class="p"/>
  <text x="390" y="238" text-anchor="middle" class="h">Codex</text>
  <text x="390" y="260" text-anchor="middle" class="s">plugin.json + skills</text>
  <rect x="520" y="210" width="180" height="76" class="p"/>
  <text x="610" y="238" text-anchor="middle" class="h">OpenCode</text>
  <text x="610" y="260" text-anchor="middle" class="s">plugin JS 注入</text>
  <rect x="740" y="210" width="180" height="76" class="p"/>
  <text x="830" y="238" text-anchor="middle" class="h">Gemini</text>
  <text x="830" y="260" text-anchor="middle" class="s">GEMINI.md 引用</text>
  <rect x="455" y="365" width="250" height="70" class="core"/>
  <text x="580" y="393" text-anchor="middle" class="h">using-superpowers</text>
  <text x="580" y="416" text-anchor="middle" class="s">建立技能检查与加载纪律</text>
  <rect x="430" y="500" width="300" height="54" class="box"/>
  <text x="580" y="533" text-anchor="middle" class="h">后续请求进入技能分流</text>
  <path d="M560 144 C560 180 170 175 170 210" class="thin"/>
  <path d="M560 144 C560 180 390 175 390 210" class="thin"/>
  <path d="M560 144 C560 180 610 175 610 210" class="thin"/>
  <path d="M560 144 C560 180 830 175 830 210" class="thin"/>
  <path d="M170 286 C170 340 580 325 580 365" class="thin"/>
  <path d="M390 286 C390 330 580 330 580 365" class="thin"/>
  <path d="M610 286 C610 330 580 330 580 365" class="thin"/>
  <path d="M830 286 C830 340 580 325 580 365" class="thin"/>
  <path d="M580 435 L580 500" class="line"/>
</svg>
