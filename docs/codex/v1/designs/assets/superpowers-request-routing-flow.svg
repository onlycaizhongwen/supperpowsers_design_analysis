<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">请求分流分支流程图</title>
  <desc id="desc">展示 using-superpowers 如何按用户请求类型分流到不同 skill。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker>
    <style>.bg{fill:#fff;stroke:#cbd5e1;stroke-width:1.2;rx:12}.core{fill:#fef3c7;stroke:#d97706;stroke-width:1.5;rx:10}.box{fill:#f8fafc;stroke:#334155;stroke-width:1.3;rx:10}.skill{fill:#ecfdf5;stroke:#059669;stroke-width:1.4;rx:10}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:1.4;rx:10}.line{stroke:#334155;stroke-width:1.4;fill:none;marker-end:url(#arrow)}.thin{stroke:#94a3b8;stroke-width:1.2;fill:none;marker-end:url(#arrow)}text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#0f172a}.t{font-size:24px;font-weight:700}.h{font-size:16px;font-weight:700}.s{font-size:13px;font-weight:500;fill:#475569}</style>
  </defs>
  <rect x="20" y="20" width="1080" height="660" class="bg"/>
  <text x="560" y="58" text-anchor="middle" class="t">请求分流分支</text>
  <rect x="450" y="90" width="220" height="54" class="core"/>
  <text x="560" y="123" text-anchor="middle" class="h">用户发起请求</text>
  <rect x="420" y="185" width="280" height="66" class="core"/>
  <text x="560" y="212" text-anchor="middle" class="h">using-superpowers 检查技能</text>
  <text x="560" y="235" text-anchor="middle" class="s">相关或被点名的 skill 必须先加载</text>
  <path d="M560 144 L560 185" class="line"/>
  <rect x="65" y="330" width="190" height="70" class="skill"/>
  <text x="160" y="358" text-anchor="middle" class="h">创意 / 新功能</text>
  <text x="160" y="380" text-anchor="middle" class="s">brainstorming</text>
  <rect x="280" y="330" width="190" height="70" class="skill"/>
  <text x="375" y="358" text-anchor="middle" class="h">已有规格</text>
  <text x="375" y="380" text-anchor="middle" class="s">writing-plans</text>
  <rect x="495" y="330" width="190" height="70" class="skill"/>
  <text x="590" y="358" text-anchor="middle" class="h">已有计划</text>
  <text x="590" y="380" text-anchor="middle" class="s">subagent / executing</text>
  <rect x="710" y="330" width="190" height="70" class="skill"/>
  <text x="805" y="358" text-anchor="middle" class="h">实现 / 修复</text>
  <text x="805" y="380" text-anchor="middle" class="s">TDD 或 debugging</text>
  <rect x="925" y="330" width="130" height="70" class="skill"/>
  <text x="990" y="358" text-anchor="middle" class="h">完成前</text>
  <text x="990" y="380" text-anchor="middle" class="s">verify / review</text>
  <path d="M560 251 C560 300 160 295 160 330" class="thin"/>
  <path d="M560 251 C560 300 375 295 375 330" class="thin"/>
  <path d="M560 251 L590 330" class="thin"/>
  <path d="M560 251 C560 300 805 295 805 330" class="thin"/>
  <path d="M560 251 C560 305 990 295 990 330" class="thin"/>
  <rect x="150" y="500" width="260" height="66" class="warn"/>
  <text x="280" y="528" text-anchor="middle" class="h">若请求模糊</text>
  <text x="280" y="550" text-anchor="middle" class="s">先澄清意图，不直接实现</text>
  <rect x="710" y="500" width="260" height="66" class="warn"/>
  <text x="840" y="528" text-anchor="middle" class="h">若 skill 不适用</text>
  <text x="840" y="550" text-anchor="middle" class="s">继续普通响应或执行</text>
  <path d="M160 400 C160 455 280 450 280 500" class="thin"/>
  <path d="M805 400 C805 455 840 450 840 500" class="thin"/>
</svg>
