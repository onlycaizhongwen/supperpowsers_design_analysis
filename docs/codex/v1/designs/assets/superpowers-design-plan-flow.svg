<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">设计与计划分支流程图</title>
  <desc id="desc">展示 brainstorming 到 writing-plans 的执行流程。</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#334155"/></marker><style>.bg{fill:#fff;stroke:#cbd5e1;stroke-width:1.2;rx:12}.b{fill:#eff6ff;stroke:#2563eb;stroke-width:1.4;rx:10}.p{fill:#ecfdf5;stroke:#059669;stroke-width:1.4;rx:10}.d{fill:#fef3c7;stroke:#d97706;stroke-width:1.4;rx:10}.line{stroke:#334155;stroke-width:1.4;fill:none;marker-end:url(#arrow)}text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#0f172a}.t{font-size:24px;font-weight:700}.h{font-size:16px;font-weight:700}.s{font-size:13px;font-weight:500;fill:#475569}</style></defs>
  <rect x="20" y="20" width="1080" height="720" class="bg"/>
  <text x="560" y="58" text-anchor="middle" class="t">设计与计划分支</text>
  <rect x="435" y="90" width="250" height="56" class="d"/><text x="560" y="124" text-anchor="middle" class="h">创意 / 新功能请求</text>
  <rect x="120" y="205" width="230" height="70" class="b"/><text x="235" y="233" text-anchor="middle" class="h">探索项目上下文</text><text x="235" y="255" text-anchor="middle" class="s">读文件、文档、近期提交</text>
  <rect x="445" y="205" width="230" height="70" class="b"/><text x="560" y="233" text-anchor="middle" class="h">必要时提供视觉辅助</text><text x="560" y="255" text-anchor="middle" class="s">仅在视觉问题时使用</text>
  <rect x="770" y="205" width="230" height="70" class="b"/><text x="885" y="233" text-anchor="middle" class="h">逐个澄清问题</text><text x="885" y="255" text-anchor="middle" class="s">目标、约束、成功标准</text>
  <rect x="120" y="350" width="230" height="70" class="b"/><text x="235" y="378" text-anchor="middle" class="h">提出 2-3 个方案</text><text x="235" y="400" text-anchor="middle" class="s">给出取舍与推荐</text>
  <rect x="445" y="350" width="230" height="70" class="b"/><text x="560" y="378" text-anchor="middle" class="h">分段展示设计</text><text x="560" y="400" text-anchor="middle" class="s">获得用户确认</text>
  <rect x="770" y="350" width="230" height="70" class="b"/><text x="885" y="378" text-anchor="middle" class="h">写设计文档</text><text x="885" y="400" text-anchor="middle" class="s">spec + 自查 + 用户复核</text>
  <rect x="260" y="530" width="250" height="70" class="p"/><text x="385" y="558" text-anchor="middle" class="h">writing-plans</text><text x="385" y="580" text-anchor="middle" class="s">把设计拆成小任务</text>
  <rect x="610" y="530" width="250" height="70" class="p"/><text x="735" y="558" text-anchor="middle" class="h">执行方式选择</text><text x="735" y="580" text-anchor="middle" class="s">子代理驱动 / 内联执行</text>
  <path d="M560 146 C560 180 235 175 235 205" class="line"/><path d="M350 240 L445 240" class="line"/><path d="M675 240 L770 240" class="line"/>
  <path d="M885 275 C885 320 235 310 235 350" class="line"/><path d="M350 385 L445 385" class="line"/><path d="M675 385 L770 385" class="line"/>
  <path d="M885 420 C885 500 385 465 385 530" class="line"/><path d="M510 565 L610 565" class="line"/>
</svg>
