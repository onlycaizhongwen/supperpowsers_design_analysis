<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>superpowers 总流程图</title>
  <style>
    body {
      margin: 0;
      background: #f8fafc;
      color: #0f172a;
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }

    main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.3;
    }

    .frame {
      overflow: auto;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    img {
      display: block;
      width: 100%;
      min-width: 900px;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>superpowers 总流程图</h1>
    <div class="frame">
      <img src="superpowers-flow.svg" alt="superpowers 平台接入与开发工作流总图">
    </div>
  </main>
</body>
</html>
